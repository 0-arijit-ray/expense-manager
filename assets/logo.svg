<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <defs>
    <linearGradient id="shieldGrad" x1="200" y1="0" x2="200" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2A9D8F"/>
      <stop offset="100%" stop-color="#1A5C4F"/>
    </linearGradient>
    <linearGradient id="chartGrad" x1="0" y1="0" x2="400" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#E9F5F2"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#1A5C4F" flood-opacity="0.25"/>
    </filter>
  </defs>
  
  <!-- Shield background -->
  <path d="M200 16 L368 80 L368 192 C368 288 296 352 200 376 C104 352 32 288 32 192 L32 80 Z" 
        fill="url(#shieldGrad)" filter="url(#shadow)"/>
  
  <!-- Inner shield -->
  <path d="M200 40 L344 96 L344 192 C344 272 284 328 200 352 C116 328 56 272 56 192 L56 96 Z" 
        fill="url(#chartGrad)"/>
  
  <!-- Wallet icon -->
  <g transform="translate(128, 120)">
    <!-- Wallet body -->
    <rect x="32" y="48" width="108" height="80" rx="10" fill="#1A5C4F"/>
    <!-- Wallet flap -->
    <path d="M32 56 L32 48 Q32 40 40 40 L140 40 Q148 40 148 48 L148 56" 
          fill="#2A9D8F" stroke="#1A5C4F" stroke-width="2"/>
    <!-- Wallet clasp -->
    <circle cx="130" cy="88" r="10" fill="#2A9D8F"/>
    <circle cx="130" cy="88" r="5" fill="#1A5C4F"/>
  </g>
  
  <!-- Upward trend line -->
  <g stroke="#2A9D8F" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M80 288 L128 256 L176 272 L240 224 L320 240"/>
    <!-- Arrow head -->
    <path d="M304 232 L320 240 L312 256"/>
  </g>
  
  <!-- Dollar sign -->
  <g transform="translate(280, 120)" fill="#1A5C4F">
    <path d="M19 0 Q29 -6 38 0 Q45 6 38 13 L35 16 L35 22 L38 25 Q45 32 38 38 Q29 44 19 38 Q13 32 19 25 L22 22 L22 16 L19 13 Q13 6 19 0 Z M19 10 Q16 7 16 10 L16 13 L19 16 L22 13 L22 10 Q22 7 19 10 Z M19 28 Q16 25 16 28 L16 32 L19 35 L22 32 L22 28 Q22 25 19 28 Z"/>
  </g>
  
  <!-- Company Name: Ease Your Finance -->
  <text x="460" y="170" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="48" font-weight="700" fill="#1A5C4F" letter-spacing="-1">
    Ease Your
  </text>
  <text x="460" y="228" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="48" font-weight="700" fill="#2A9D8F" letter-spacing="-1">
    Finance
  </text>
  
  <!-- Tagline -->
  <text x="460" y="272" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="22" font-weight="400" fill="#6B7280" letter-spacing="0.5">
    Your money, simplified
  </text>
</svg>
