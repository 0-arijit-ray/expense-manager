<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="shieldGrad" x1="256" y1="0" x2="256" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2A9D8F"/>
      <stop offset="100%" stop-color="#1A5C4F"/>
    </linearGradient>
    <linearGradient id="chartGrad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#E9F5F2"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1A5C4F" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Shield background -->
  <path d="M256 32 L464 112 L464 256 C464 384 368 464 256 496 C144 464 48 384 48 256 L48 112 Z" 
        fill="url(#shieldGrad)" filter="url(#shadow)"/>
  
  <!-- Inner shield -->
  <path d="M256 64 L432 136 L432 256 C432 368 344 432 256 464 C168 432 80 368 80 256 L80 136 Z" 
        fill="url(#chartGrad)"/>
  
  <!-- Wallet icon -->
  <g transform="translate(168, 168)">
    <!-- Wallet body -->
    <rect x="40" y="60" width="136" height="100" rx="12" fill="#1A5C4F"/>
    <!-- Wallet flap -->
    <path d="M40 72 L40 60 Q40 48 52 48 L176 48 Q188 48 188 60 L188 72" 
          fill="#2A9D8F" stroke="#1A5C4F" stroke-width="2"/>
    <!-- Wallet clasp -->
    <circle cx="164" cy="110" r="12" fill="#2A9D8F"/>
    <circle cx="164" cy="110" r="6" fill="#1A5C4F"/>
  </g>
  
  <!-- Upward trend line -->
  <g stroke="#2A9D8F" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M120 360 L180 320 L240 340 L320 280 L400 300"/>
    <!-- Arrow head -->
    <path d="M380 290 L400 300 L390 320"/>
  </g>
  
  <!-- Dollar sign -->
  <g transform="translate(360, 160)" fill="#1A5C4F">
    <path d="M24 0 Q36 -8 48 0 Q56 8 48 16 L44 20 L44 28 L48 32 Q56 40 48 48 Q36 56 24 48 Q16 40 24 32 L28 28 L28 20 L24 16 Q16 8 24 0 Z M24 12 Q20 8 20 12 L20 16 L24 20 L28 16 L28 12 Q28 8 24 12 Z M24 36 Q20 32 20 36 L20 40 L24 44 L28 40 L28 36 Q28 32 24 36 Z"/>
  </g>
</svg>
