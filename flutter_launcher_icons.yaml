flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo_512x512.png"
  
  # Android adaptive icons
  adaptive_icon_background: "#1A5C4F"
  adaptive_icon_foreground: "assets/logo_512x512.png"
  
  # iOS
  remove_alpha_ios: true
  
  # Web
  web:
    generate: true
    image_path: "assets/logo_512x512.png"
    background_color: "#1A5C4F"
    theme_color: "#2A9D8F"
  
  # Windows
  windows:
    generate: true
    image_path: "assets/logo_512x512.png"
  
  # Web favicon
  web_favicon: "assets/logo_512x512.png"
